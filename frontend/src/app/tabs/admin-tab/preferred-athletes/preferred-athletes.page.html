<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin"></ion-back-button>
    </ion-buttons>
    <ion-title>Manage Heats</ion-title>
    <app-toolbar-buttons slot="end"></app-toolbar-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (loading()) {
  <div class="loading-container">
    <ion-spinner></ion-spinner>
  </div>
  }

  <ion-list [inset]="true">
    @for (athlete of preferredAthletes(); track athlete.id) {
    <ion-item>
      <ion-label>
        <h2>{{ athlete.name }}</h2>
        <p>{{ athlete.start_time }}</p>
      </ion-label>
      <ion-button (click)="openAthleteForm(athlete)" slot="end" fill="clear">
        <ion-icon name="pencil" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button
        (click)="deleteAthlete(athlete)"
        slot="end"
        fill="clear"
        color="danger"
      >
        <ion-icon name="trash" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-item>
    } @empty { @if (!loading()) {
    <ion-item>
      <ion-label class="ion-text-center">
        <p>No preferred athletes yet. Add one to get started!</p>
      </ion-label>
    </ion-item>
    } }
  </ion-list>

  <div style="height: 80px"></div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openAthleteForm()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
